apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: order-service-dev
  namespace: argocd

spec:

  project: default

  source:
    repoURL: https://github.com/anujpal/order-service
    targetRevision: main

    path: charts/order-service

    helm:
      valueFiles:
        - values-dev.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true