apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: order-service-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/YOUR_GITHUB_USERNAME/order-service.git
    targetRevision: main
    path: charts

    helm:
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true